apiVersion: v1
kind: Namespace
metadata:
  name: aana-runtime
  labels:
    aana.openai.local/profile: production-template
---
apiVersion: v1
kind: Secret
metadata:
  name: aana-bridge-auth
  namespace: aana-runtime
type: Opaque
stringData:
  AANA_BRIDGE_TOKEN: replace-with-secret-manager-injected-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aana-bridge-config
  namespace: aana-runtime
  labels:
    aana.openai.local/profile: production-template
data:
  AANA_BRIDGE_HOST: "0.0.0.0"
  AANA_BRIDGE_PORT: "8765"
  AANA_BRIDGE_TOKEN_SCOPES: "pre_tool_check,agent_check,workflow_check,workflow_batch,validation,aix_audit,durable_audit_storage,human_review_export,live_monitoring,enterprise_connectors,enterprise_live_connectors,enterprise_demo,mlcommons_aix_report,production_candidate_profile,production_candidate_check"
  AANA_ADAPTER_GALLERY: "examples/adapter_gallery.json"
  AANA_AUDIT_LOG: "/app/eval_outputs/audit/production/aana-fastapi.jsonl"
  AANA_MAX_REQUEST_BYTES: "1048576"
  AANA_RATE_LIMIT_PER_MINUTE: "60"
  AANA_EDGE_RATE_LIMIT_PER_MINUTE: "60"
  AANA_EDGE_RATE_LIMIT_BURST: "15"
  AANA_EDGE_RATE_LIMIT_SCOPE: "per authenticated client token"
  AANA_EVIDENCE_REGISTRY: "replace-with-approved-evidence-registry"
  AANA_DEPLOYMENT_MANIFEST: "examples/production_deployment_template.json"
  AANA_GOVERNANCE_POLICY: "examples/human_governance_policy_template.json"
  AANA_OBSERVABILITY_POLICY: "examples/observability_policy.json"
  AANA_PRODUCTION_CANDIDATE_PROFILE: "examples/production_candidate_profile_enterprise_support.json"
  AANA_LIVE_CONNECTOR_CONFIG: "replace-with-approved-live-connector-config"
  AANA_LIVE_MONITORING_CONFIG: "replace-with-approved-live-monitoring-config"
  AANA_REVIEW_ROUTE: "replace-with-production-human-review-queue"
  AANA_PROFILE_STATUS: "requires-external-evidence-and-owner-signoff"
  AANA_TLS_TERMINATION: "managed ingress controller"
  AANA_HTTPS_ONLY: "true"
  AANA_ROLLBACK_COMMAND: "kubectl rollout undo deployment/aana-bridge -n aana-runtime"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aana-audit-log
  namespace: aana-runtime
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aana-bridge
  namespace: aana-runtime
  labels:
    app.kubernetes.io/name: aana-bridge
    app.kubernetes.io/component: runtime-guardrail
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aana-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aana-bridge
        app.kubernetes.io/component: runtime-guardrail
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge
          image: registry.example/aana/enterprise-ops-runtime:0.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aana-bridge-config
            - secretRef:
                name: aana-bridge-auth
          ports:
            - name: http
              containerPort: 8765
          command:
            - /bin/sh
            - -c
            - >
              mkdir -p "$(dirname "$AANA_AUDIT_LOG")" &&
              aana-fastapi
              --host "$AANA_BRIDGE_HOST"
              --port "$AANA_BRIDGE_PORT"
              --gallery "$AANA_ADAPTER_GALLERY"
              --audit-log "$AANA_AUDIT_LOG"
              --rate-limit-per-minute "$AANA_RATE_LIMIT_PER_MINUTE"
              --max-request-bytes "$AANA_MAX_REQUEST_BYTES"
          volumeMounts:
            - name: audit-log
              mountPath: /app/eval_outputs/audit
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: audit-log
          persistentVolumeClaim:
            claimName: aana-audit-log
---
apiVersion: v1
kind: Service
metadata:
  name: aana-bridge
  namespace: aana-runtime
spec:
  selector:
    app.kubernetes.io/name: aana-bridge
  ports:
    - name: http
      port: 8765
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aana-bridge
  namespace: aana-runtime
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rpm: "60"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "1"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
spec:
  ingressClassName: nginx-internal
  tls:
    - hosts:
        - aana.production.example
      secretName: aana-bridge-tls
  rules:
    - host: aana.production.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aana-bridge
                port:
                  name: http

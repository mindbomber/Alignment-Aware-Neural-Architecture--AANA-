apiVersion: v1
kind: Namespace
metadata:
  name: aana-runtime
---
apiVersion: v1
kind: Secret
metadata:
  name: aana-bridge-auth
  namespace: aana-runtime
type: Opaque
stringData:
  AANA_BRIDGE_TOKEN: replace-with-long-random-token
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aana-bridge-config
  namespace: aana-runtime
data:
  AANA_BRIDGE_HOST: "0.0.0.0"
  AANA_BRIDGE_PORT: "8765"
  AANA_ADAPTER_GALLERY: "examples/adapter_gallery.json"
  AANA_AUDIT_LOG: "/app/eval_outputs/audit/kubernetes/aana-bridge.jsonl"
  AANA_MAX_BODY_BYTES: "1048576"
  AANA_RATE_LIMIT_PER_MINUTE: "120"
  AANA_READ_TIMEOUT_SECONDS: "30"
  AANA_EVIDENCE_REGISTRY: "examples/evidence_registry.json"
  AANA_DEPLOYMENT_MANIFEST: "examples/production_deployment_internal_pilot.json"
  AANA_GOVERNANCE_POLICY: "examples/human_governance_policy_internal_pilot.json"
  AANA_OBSERVABILITY_POLICY: "examples/observability_policy_internal_pilot.json"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aana-audit-log
  namespace: aana-runtime
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aana-bridge
  namespace: aana-runtime
  labels:
    app.kubernetes.io/name: aana-bridge
    app.kubernetes.io/component: runtime-guardrail
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: aana-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aana-bridge
        app.kubernetes.io/component: runtime-guardrail
    spec:
      containers:
        - name: bridge
          image: aana/http-bridge:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: aana-bridge-config
            - secretRef:
                name: aana-bridge-auth
          ports:
            - name: http
              containerPort: 8765
          command:
            - /bin/sh
            - -c
            - >
              mkdir -p "$(dirname "$AANA_AUDIT_LOG")" &&
              python scripts/aana_server.py
              --host "$AANA_BRIDGE_HOST"
              --port "$AANA_BRIDGE_PORT"
              --gallery "$AANA_ADAPTER_GALLERY"
              --audit-log "$AANA_AUDIT_LOG"
              --max-body-bytes "$AANA_MAX_BODY_BYTES"
              --rate-limit-per-minute "$AANA_RATE_LIMIT_PER_MINUTE"
              --read-timeout-seconds "$AANA_READ_TIMEOUT_SECONDS"
          volumeMounts:
            - name: audit-log
              mountPath: /app/eval_outputs/audit
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: audit-log
          persistentVolumeClaim:
            claimName: aana-audit-log
---
apiVersion: v1
kind: Service
metadata:
  name: aana-bridge
  namespace: aana-runtime
spec:
  selector:
    app.kubernetes.io/name: aana-bridge
  ports:
    - name: http
      port: 8765
      targetPort: http

apiVersion: v1
kind: ConfigMap
metadata:
  name: aana-bridge-config
  namespace: aana-runtime
  labels:
    aana.openai.local/profile: internal-pilot
data:
  AANA_BRIDGE_HOST: "0.0.0.0"
  AANA_BRIDGE_PORT: "8765"
  AANA_BRIDGE_TOKEN_SCOPES: "pre_tool_check,agent_check,workflow_check,workflow_batch,validation,aix_audit,durable_audit_storage,human_review_export,live_monitoring,enterprise_connectors,enterprise_live_connectors,enterprise_demo,mlcommons_aix_report,production_candidate_profile,production_candidate_check"
  AANA_ADAPTER_GALLERY: "examples/adapter_gallery.json"
  AANA_AUDIT_LOG: "/app/eval_outputs/audit/internal-pilot/aana-fastapi.jsonl"
  AANA_MAX_REQUEST_BYTES: "1048576"
  AANA_RATE_LIMIT_PER_MINUTE: "120"
  AANA_EDGE_RATE_LIMIT_PER_MINUTE: "120"
  AANA_EDGE_RATE_LIMIT_BURST: "30"
  AANA_EDGE_RATE_LIMIT_SCOPE: "per authenticated client token"
  AANA_EVIDENCE_REGISTRY: "examples/evidence_registry.json"
  AANA_DEPLOYMENT_MANIFEST: "examples/production_deployment_internal_pilot.json"
  AANA_GOVERNANCE_POLICY: "examples/human_governance_policy_internal_pilot.json"
  AANA_OBSERVABILITY_POLICY: "examples/observability_policy_internal_pilot.json"
  AANA_PRODUCTION_CANDIDATE_PROFILE: "examples/production_candidate_profile_enterprise_support.json"
  AANA_LIVE_CONNECTOR_CONFIG: "examples/enterprise_support_live_connectors.json"
  AANA_LIVE_MONITORING_CONFIG: "examples/live_monitoring_metrics.json"
  AANA_REVIEW_ROUTE: "AANA Internal Pilot Human Review Queue"
  AANA_PROFILE_STATUS: "pilot-ready-not-production-certified"

services:
  aana-bridge:
    build:
      context: .
    image: aana/enterprise-ops-runtime:local
    ports:
      - "${AANA_BRIDGE_PORT:-8765}:8765"
    environment:
      AANA_BRIDGE_TOKEN: "${AANA_BRIDGE_TOKEN:-aana-local-dev-token}"
      AANA_BRIDGE_TOKEN_SCOPES: "${AANA_BRIDGE_TOKEN_SCOPES:-pre_tool_check,agent_check,workflow_check,workflow_batch,validation,aix_audit,durable_audit_storage,human_review_export,live_monitoring,enterprise_connectors,enterprise_live_connectors,enterprise_demo,mlcommons_aix_report,production_candidate_profile,production_candidate_check}"
      AANA_ADAPTER_GALLERY: "${AANA_ADAPTER_GALLERY:-examples/adapter_gallery.json}"
      AANA_AUDIT_LOG: "${AANA_AUDIT_LOG:-eval_outputs/audit/docker/aana-fastapi.jsonl}"
      AANA_MAX_REQUEST_BYTES: "${AANA_MAX_REQUEST_BYTES:-1048576}"
      AANA_RATE_LIMIT_PER_MINUTE: "${AANA_RATE_LIMIT_PER_MINUTE:-60}"
      AANA_EVIDENCE_REGISTRY: "${AANA_EVIDENCE_REGISTRY:-examples/evidence_registry.json}"
      AANA_PRODUCTION_CANDIDATE_PROFILE: "${AANA_PRODUCTION_CANDIDATE_PROFILE:-examples/production_candidate_profile_enterprise_support.json}"
      AANA_LIVE_CONNECTOR_CONFIG: "${AANA_LIVE_CONNECTOR_CONFIG:-examples/enterprise_support_live_connectors.json}"
      AANA_LIVE_MONITORING_CONFIG: "${AANA_LIVE_MONITORING_CONFIG:-examples/live_monitoring_metrics.json}"
    command:
      - /bin/sh
      - -c
      - >
        mkdir -p "$$(dirname "$${AANA_AUDIT_LOG}")" &&
        aana-fastapi
        --host 0.0.0.0
        --port 8765
        --gallery "$${AANA_ADAPTER_GALLERY}"
        --audit-log "$${AANA_AUDIT_LOG}"
        --rate-limit-per-minute "$${AANA_RATE_LIMIT_PER_MINUTE}"
        --max-request-bytes "$${AANA_MAX_REQUEST_BYTES}"
    volumes:
      - ./eval_outputs:/app/eval_outputs
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8765/ready', timeout=5)); raise SystemExit(0 if data.get('status') == 'ok' else 1)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

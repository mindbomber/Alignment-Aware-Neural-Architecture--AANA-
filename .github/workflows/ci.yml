name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: python scripts/dev.py compile

      - name: Run tests
        run: python scripts/dev.py test

      - name: Validate production profiles
        run: >
          python scripts/dev.py production-profiles
          --audit-log eval_outputs/audit/ci/aana-ci-audit.jsonl
          --metrics-output eval_outputs/audit/ci/aana-ci-metrics.json
          --drift-output eval_outputs/audit/ci/aana-ci-aix-drift.json
          --reviewer-report-output eval_outputs/audit/ci/aana-ci-reviewer-report.md
          --manifest-output eval_outputs/audit/ci/manifests/aana-ci-audit-integrity.json

      - name: Upload production profile audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aana-production-profile-audit-artifacts
          path: |
            eval_outputs/audit/ci/aana-ci-audit.jsonl
            eval_outputs/audit/ci/aana-ci-metrics.json
            eval_outputs/audit/ci/aana-ci-aix-drift.json
            eval_outputs/audit/ci/aana-ci-reviewer-report.md
            eval_outputs/audit/ci/manifests/aana-ci-audit-integrity.json
          if-no-files-found: warn

name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[api]
          python -m pip install pip-audit

      - name: Run gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run repo-local secret scan
        run: python scripts/validate_secrets_scan.py

      - name: Run dependency audit
        run: pip-audit --desc --progress-spinner off

      - name: Run security hardening gate
        run: python scripts/validate_security_hardening.py

      - name: Build TypeScript SDK
        run: |
          npm --prefix sdk/typescript install
          npm --prefix sdk/typescript run build

      - name: Run AANA platform CI gate
        run: python scripts/validate_aana_platform.py

      - name: Run hardened release gates
        run: >
          python scripts/dev.py release-gate
          --audit-log eval_outputs/audit/ci/aana-ci-audit.jsonl
          --metrics-output eval_outputs/audit/ci/aana-ci-metrics.json
          --drift-output eval_outputs/audit/ci/aana-ci-aix-drift.json
          --reviewer-report-output eval_outputs/audit/ci/aana-ci-reviewer-report.md
          --manifest-output eval_outputs/audit/ci/manifests/aana-ci-audit-integrity.json

      - name: Upload production profile audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aana-production-profile-audit-artifacts
          path: |
            eval_outputs/audit/ci/aana-ci-metrics.json
            eval_outputs/audit/ci/aana-ci-aix-drift.json
            eval_outputs/audit/ci/aana-ci-reviewer-report.md
            eval_outputs/audit/ci/manifests/aana-ci-audit-integrity.json
          if-no-files-found: warn

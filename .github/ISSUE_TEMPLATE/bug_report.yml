name: Bug report
description: Report a reproducible problem in the code or workflows.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the unexpected behavior.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command or workflow
      description: Paste the exact command you ran, if applicable.
      render: shell
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Error output or logs
      description: Paste the relevant error output. Remove secrets before posting.
      render: text
    validations:
      required: false
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "Example: Python 3.11.8"
    validations:
      required: false
  - type: dropdown
    id: api-calls
    attributes:
      label: Did this make live API calls?
      options:
        - "No, dry-run or local-only"
        - "Yes"
        - "Not sure"
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed API keys, private prompts, and sensitive generated outputs from this report.
          required: true

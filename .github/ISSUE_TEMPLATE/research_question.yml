name: Research or evaluation question
description: Discuss an evaluation design question, benchmark concern, or AANA research idea.
title: "[Research]: "
labels: ["research", "question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question or proposal
      description: What research or evaluation issue should be discussed?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include relevant scripts, docs, results, or examples.
    validations:
      required: false
  - type: textarea
    id: expected-impact
    attributes:
      label: Why it matters
      description: How would this improve the evaluation pipeline or AANA analysis?
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include private data, unpublished sensitive outputs, or API keys.
          required: true

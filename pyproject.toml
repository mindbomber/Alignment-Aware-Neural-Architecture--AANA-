[project]
name = "aana-eval-pipeline"
version = "0.1.0"
description = "Evaluation pipeline for Alignment-Aware Neural Architecture experiments."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
  { name = "Armando Sori" }
]
keywords = [
  "alignment",
  "ai-safety",
  "llm-evaluation",
  "openai",
  "aana",
  "evaluation-pipeline",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/mindbomber/Alignment-Aware-Neural-Architecture--AANA-"
Repository = "https://github.com/mindbomber/Alignment-Aware-Neural-Architecture--AANA-"
Issues = "https://github.com/mindbomber/Alignment-Aware-Neural-Architecture--AANA-/issues"

[project.scripts]
aana = "scripts.aana_cli:main"
aana-server = "eval_pipeline.agent_server:main"

[tool.setuptools.packages.find]
include = ["eval_pipeline*", "scripts*"]

[tool.unittest]
start-dir = "tests"
